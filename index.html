<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laptop Finder Quiz — Find Your Perfect Laptop in 60 Seconds</title>
  <meta name="description" content="Answer 5 quick questions and get a personalized laptop recommendation matched to your budget, use case, and preferences. Free laptop finder quiz." />
  <meta name="keywords" content="laptop finder quiz, best laptop for me, what laptop should I buy, laptop recommendation 2026" />
  <link rel="canonical" href="https://jarv-visual.github.io/laptop-quiz/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- GA4 PLACEHOLDER — replace MEASUREMENT_ID after Google Analytics setup -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'GA_MEASUREMENT_ID');
  </script>
  <style>
    .fade-in { animation: fadeIn 0.4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .option-btn { transition: all 0.2s; }
    .option-btn:hover { transform: translateY(-2px); }
    .option-btn.selected { border-color: #6366f1; background: #eef2ff; }
    .progress-bar { transition: width 0.4s ease; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-white shadow-sm py-4 px-6">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <span class="font-bold text-indigo-600 text-lg">LaptopMatch</span>
      <a href="article.html" class="text-sm text-slate-500 hover:text-indigo-600">Buying Guide →</a>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-2xl mx-auto px-4 py-10">

    <!-- Intro screen -->
    <div id="intro" class="text-center fade-in">
      <div class="text-5xl mb-4">💻</div>
      <h1 class="text-3xl font-bold text-slate-800 mb-3">Find Your Perfect Laptop</h1>
      <p class="text-slate-500 text-lg mb-8">Answer 5 quick questions — we'll match you with the best laptop for your needs and budget.</p>
      <button onclick="startQuiz()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-10 py-4 rounded-xl text-lg shadow-lg hover:shadow-xl transition-all">
        Start the Quiz →
      </button>
      <p class="text-xs text-slate-400 mt-4">Takes about 60 seconds · No email required</p>
    </div>

    <!-- Quiz screen -->
    <div id="quiz" class="hidden fade-in">
      <!-- Progress bar -->
      <div class="mb-8">
        <div class="flex justify-between text-sm text-slate-400 mb-2">
          <span id="progress-label">Question 1 of 5</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="bg-slate-200 rounded-full h-2">
          <div id="progress-bar" class="bg-indigo-500 rounded-full h-2 progress-bar" style="width:0%"></div>
        </div>
      </div>

      <div id="question-container"></div>

      <div class="flex gap-3 mt-8">
        <button id="btn-back" onclick="prevQuestion()" class="hidden px-6 py-3 rounded-xl border border-slate-300 text-slate-600 hover:bg-slate-50 font-medium transition-all">← Back</button>
        <button id="btn-next" onclick="nextQuestion()" class="hidden flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-3 rounded-xl transition-all">Next →</button>
      </div>
    </div>

    <!-- Result screen -->
    <div id="result" class="hidden fade-in"></div>

  </main>

  <footer class="text-center py-8 text-xs text-slate-400">
    <p>As an Amazon Associate, we earn from qualifying purchases. <a href="article.html" class="underline hover:text-indigo-500">Laptop Buying Guide</a></p>
  </footer>

  <script>
    const questions = [
      {
        id: 'budget',
        text: "What's your budget?",
        icon: '💰',
        options: [
          { label: 'Under $450', value: 'low' },
          { label: '$450 – $550', value: 'mid' },
          { label: '$550 – $650', value: 'high' },
        ]
      },
      {
        id: 'use',
        text: 'What will you mainly use it for?',
        icon: '🎯',
        options: [
          { label: '📚 School / Office work', value: 'student' },
          { label: '🎮 Gaming', value: 'gaming' },
          { label: '🎨 Creative work (video, design)', value: 'creative' },
          { label: '🔄 Everything — I need flexibility', value: 'flex' },
        ]
      },
      {
        id: 'screen',
        text: 'What screen size do you prefer?',
        icon: '🖥️',
        options: [
          { label: '13–14" — Compact and portable', value: 'small' },
          { label: '15–16" — Bigger is better', value: 'large' },
        ]
      },
      {
        id: 'battery',
        text: 'How important is battery life?',
        icon: '🔋',
        options: [
          { label: '⚡ Critical — I work away from outlets all day', value: 'high' },
          { label: '🔌 Moderate — I usually have access to power', value: 'low' },
        ]
      },
      {
        id: 'priority',
        text: 'What matters most to you?',
        icon: '⭐',
        options: [
          { label: '💵 Lowest possible price', value: 'price' },
          { label: '⚡ Best performance', value: 'performance' },
          { label: '🎁 Best all-round value', value: 'value' },
        ]
      }
    ];

    const laptops = [
      {
        id: 'acer_aspire5',
        name: 'Acer Aspire 5',
        tagline: 'Best Budget All-Rounder',
        price: '~$449',
        stars: '4.4 ⭐',
        specs: ['AMD Ryzen 5 / Intel Core i5', '8GB RAM · 512GB SSD', '15.6" FHD Display', 'Windows 11'],
        pros: ['Excellent price-to-performance', 'Reliable everyday performance', 'Good battery life'],
        cons: ['Plastic build', 'Basic display quality'],
        badge: '🏆 Best Value',
        color: 'indigo',
        link: 'https://www.amazon.com/acer-Hexa-Core-Processor-Graphics-A515-48M-R3DF/dp/B0BXLY1F8T?tag=laptopquiz0-20',
        match: (a) => a.budget === 'low' && a.use === 'student'
      },
      {
        id: 'lenovo_ideapad3',
        name: 'Lenovo IdeaPad 3',
        tagline: 'Lightest on Your Wallet',
        price: '~$399',
        stars: '4.3 ⭐',
        specs: ['AMD Ryzen 3 / Intel Core i3', '8GB RAM · 256GB SSD', '15.6" FHD Display', 'Windows 11'],
        pros: ['Lowest price in class', 'Lenovo build quality', 'Windows 11 Pro available'],
        cons: ['Limited storage', 'Basic performance'],
        badge: '💸 Most Affordable',
        color: 'green',
        link: 'https://www.amazon.com/Lenovo-Touchscreen-i3-1115G4-Processor-Bluetooth/dp/B09V273F3C?tag=laptopquiz0-20',
        match: (a) => a.budget === 'low' && a.priority === 'price'
      },
      {
        id: 'asus_vivobook16',
        name: 'ASUS VivoBook 16',
        tagline: 'Everyday Productivity Champion',
        price: '~$499',
        stars: '4.5 ⭐',
        specs: ['AMD Ryzen 5 7520U', '8GB RAM · 512GB SSD', '16" FHD Display', 'Windows 11'],
        pros: ['Largest screen in this range', 'Fast Ryzen performance', 'Lightweight for size'],
        cons: ['Battery could be better', 'No dedicated GPU'],
        badge: '📐 Best Screen',
        color: 'purple',
        link: 'https://www.amazon.com/ASUS-VivoBook-Laptop-WUXGA-1920/dp/B0BT753MW1?tag=laptopquiz0-20',
        match: (a) => a.screen === 'large' && a.use !== 'gaming'
      },
      {
        id: 'dell_inspiron15',
        name: 'Dell Inspiron 15',
        tagline: 'The Trusted Workhorse',
        price: '~$549',
        stars: '4.4 ⭐',
        specs: ['Intel Core i5-1335U', '8GB RAM · 512GB SSD', '15.6" FHD IPS', 'Windows 11'],
        pros: ['Premium IPS display', 'Solid Dell build quality', 'Great for business/work'],
        cons: ['Slightly heavier', 'Mid-tier graphics'],
        badge: '💼 Best for Work',
        color: 'blue',
        link: 'https://www.amazon.com/Dell-Inspiron-Touchscreen-Anti-Glare-i5-1335U/dp/B0CY3CDVGL?tag=laptopquiz0-20',
        match: (a) => a.budget === 'mid' && (a.use === 'student' || a.priority === 'value')
      },
      {
        id: 'hp_victus15',
        name: 'HP Victus 15',
        tagline: 'Budget Gaming Beast',
        price: '~$599',
        stars: '4.5 ⭐',
        specs: ['AMD Ryzen 7 / RTX 4050', '16GB RAM · 512GB SSD', '15.6" FHD 144Hz', 'Windows 11'],
        pros: ['Dedicated RTX 4050 GPU', '144Hz display', '16GB RAM standard'],
        cons: ['Shorter battery life', 'Gets warm under load'],
        badge: '🎮 Best Gaming',
        color: 'red',
        link: 'https://www.amazon.com/HP-Victus-Processor-Keyboard-Bluetooth/dp/B0G5HJTNYC?tag=laptopquiz0-20',
        match: (a) => a.use === 'gaming'
      },
      {
        id: 'lenovo_flex5',
        name: 'Lenovo IdeaPad Flex 5',
        tagline: 'The Ultimate 2-in-1 Flex',
        price: '~$549',
        stars: '4.4 ⭐',
        specs: ['AMD Ryzen 5 5500U', '16GB RAM · 512GB SSD', '14" FHD Touch + Stylus', 'Windows 11'],
        pros: ['360° touchscreen', 'Stylus included', 'Compact and versatile'],
        cons: ['14" screen smaller', 'No dedicated GPU'],
        badge: '🔄 Most Flexible',
        color: 'orange',
        link: 'https://www.amazon.com/Lenovo-Display-Storage-Graphics-Graphite/dp/B09YWM1CM1?tag=laptopquiz0-20',
        match: (a) => a.use === 'flex' || a.use === 'creative'
      }
    ];

    const colorMap = {
      indigo: { bg: 'bg-indigo-50', border: 'border-indigo-400', btn: 'bg-indigo-600 hover:bg-indigo-700', badge: 'bg-indigo-100 text-indigo-700' },
      green: { bg: 'bg-green-50', border: 'border-green-400', btn: 'bg-green-600 hover:bg-green-700', badge: 'bg-green-100 text-green-700' },
      purple: { bg: 'bg-purple-50', border: 'border-purple-400', btn: 'bg-purple-600 hover:bg-purple-700', badge: 'bg-purple-100 text-purple-700' },
      blue: { bg: 'bg-blue-50', border: 'border-blue-400', btn: 'bg-blue-600 hover:bg-blue-700', badge: 'bg-blue-100 text-blue-700' },
      red: { bg: 'bg-red-50', border: 'border-red-400', btn: 'bg-red-600 hover:bg-red-700', badge: 'bg-red-100 text-red-700' },
      orange: { bg: 'bg-orange-50', border: 'border-orange-400', btn: 'bg-orange-600 hover:bg-orange-700', badge: 'bg-orange-100 text-orange-700' },
    };

    let current = 0;
    let answers = {};

    function startQuiz() {
      document.getElementById('intro').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      renderQuestion();
      gtag('event', 'quiz_start', { event_category: 'engagement' });
    }

    function renderQuestion() {
      const q = questions[current];
      const pct = Math.round((current / questions.length) * 100);
      document.getElementById('progress-label').textContent = `Question ${current + 1} of ${questions.length}`;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-bar').style.width = pct + '%';

      document.getElementById('question-container').innerHTML = `
        <div class="fade-in">
          <div class="text-4xl mb-3 text-center">${q.icon}</div>
          <h2 class="text-2xl font-bold text-slate-800 text-center mb-6">${q.text}</h2>
          <div class="grid gap-3">
            ${q.options.map(opt => `
              <button
                class="option-btn w-full text-left px-5 py-4 rounded-xl border-2 border-slate-200 bg-white text-slate-700 font-medium hover:border-indigo-300 hover:bg-indigo-50 ${answers[q.id] === opt.value ? 'selected' : ''}"
                onclick="selectOption('${q.id}', '${opt.value}', this)"
              >${opt.label}</button>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('btn-back').classList.toggle('hidden', current === 0);
      document.getElementById('btn-next').classList.toggle('hidden', !answers[q.id]);
    }

    function selectOption(qId, val, btn) {
      answers[qId] = val;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('btn-next').classList.remove('hidden');
    }

    function nextQuestion() {
      if (!answers[questions[current].id]) return;
      current++;
      if (current >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (current > 0) { current--; renderQuestion(); }
    }

    function showResult() {
      document.getElementById('quiz').classList.add('hidden');

      // Find best match
      let matched = laptops.find(l => l.match(answers));
      if (!matched) {
        // Fallback scoring
        const scores = laptops.map(l => {
          let s = 0;
          if (answers.budget === 'low' && parseInt(l.price.replace(/\D/g,'')) <= 450) s += 3;
          if (answers.budget === 'mid' && parseInt(l.price.replace(/\D/g,'')) <= 550) s += 3;
          if (answers.budget === 'high') s += 1;
          if (answers.use === 'gaming' && l.id === 'hp_victus15') s += 5;
          if (answers.use === 'flex' && l.id === 'lenovo_flex5') s += 5;
          return { l, s };
        });
        matched = scores.sort((a, b) => b.s - a.s)[0].l;
      }

      const c = colorMap[matched.color];
      const resultEl = document.getElementById('result');
      resultEl.classList.remove('hidden');
      resultEl.innerHTML = `
        <div class="fade-in">
          <div class="text-center mb-6">
            <div class="text-5xl mb-2">🎉</div>
            <h2 class="text-2xl font-bold text-slate-800">Your Perfect Match!</h2>
            <p class="text-slate-500">Based on your answers, here's our top pick for you:</p>
          </div>

          <div class="rounded-2xl border-2 ${c.border} ${c.bg} p-6 mb-6">
            <div class="flex items-start justify-between mb-3">
              <div>
                <span class="inline-block px-3 py-1 rounded-full text-sm font-semibold ${c.badge} mb-2">${matched.badge}</span>
                <h3 class="text-2xl font-bold text-slate-800">${matched.name}</h3>
                <p class="text-slate-500">${matched.tagline}</p>
              </div>
              <div class="text-right">
                <div class="text-2xl font-bold text-slate-800">${matched.price}</div>
                <div class="text-sm text-slate-500">${matched.stars}</div>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-4">
              ${matched.specs.map(s => `<div class="bg-white rounded-lg px-3 py-2 text-sm text-slate-600">✓ ${s}</div>`).join('')}
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
              <div>
                <p class="font-semibold text-green-700 mb-1">Pros</p>
                ${matched.pros.map(p => `<p class="text-slate-600">✅ ${p}</p>`).join('')}
              </div>
              <div>
                <p class="font-semibold text-red-600 mb-1">Cons</p>
                ${matched.cons.map(c => `<p class="text-slate-600">⚠️ ${c}</p>`).join('')}
              </div>
            </div>

            <a href="${matched.link}" target="_blank" rel="noopener"
              onclick="gtag('event', 'affiliate_click', { event_category: 'conversion', event_label: '${matched.id}' })"
              class="${c.btn} text-white font-bold text-lg w-full block text-center py-4 rounded-xl shadow-lg transition-all hover:shadow-xl">
              🛒 View on Amazon →
            </a>
            <p class="text-xs text-center text-slate-400 mt-2">Amazon link · As low as ${matched.price} · Free returns</p>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 p-4 mb-6">
            <p class="text-sm font-semibold text-slate-700 mb-3">Also consider these options:</p>
            <div class="grid gap-2">
              ${laptops.filter(l => l.id !== matched.id).slice(0,3).map(l => `
                <a href="${l.link}" target="_blank" rel="noopener"
                  onclick="gtag('event', 'affiliate_click', { event_category: 'secondary', event_label: '${l.id}' })"
                  class="flex items-center justify-between p-3 rounded-lg hover:bg-slate-50 border border-slate-100 transition-all">
                  <div>
                    <span class="font-medium text-slate-700 text-sm">${l.name}</span>
                    <span class="text-xs text-slate-400 ml-2">${l.tagline}</span>
                  </div>
                  <span class="text-slate-600 font-medium text-sm">${l.price} →</span>
                </a>
              `).join('')}
            </div>
          </div>

          <div class="text-center">
            <button onclick="restartQuiz()" class="text-indigo-600 hover:text-indigo-800 text-sm underline">↺ Take the quiz again</button>
            <span class="text-slate-300 mx-3">|</span>
            <a href="article.html" class="text-indigo-600 hover:text-indigo-800 text-sm underline">Read the full buying guide →</a>
          </div>
        </div>
      `;

      gtag('event', 'quiz_complete', { event_category: 'engagement', event_label: matched.id });
    }

    function restartQuiz() {
      current = 0;
      answers = {};
      document.getElementById('result').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      renderQuestion();
    }
  </script>
</body>
</html>
